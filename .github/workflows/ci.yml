name: CI

on:
  pull_request:
    branches:
      - ai-dev
      - dev
      - main
  push:
    branches:
      - ai-dev
      - dev
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            tools/slice-agent-runner/package-lock.json
            apps/web/package-lock.json

      - name: Guard tracked secret-like files
        run: |
          python3 - <<'PY'
          import re
          import subprocess
          import sys

          FORBIDDEN = [
              (re.compile(r"(^|/)\.env$"), ".env with values"),
              (re.compile(r"(^|/)\.env\.[^/]+$"), ".env.* local overrides"),
              (re.compile(r"\.pem$"), "private key material"),
              (re.compile(r"credentials\.json$"), "credentials.json"),
              (re.compile(r"(^|/)id_rsa$"), "SSH private key"),
          ]
          ALLOW = re.compile(r"\.env\.example$|\.env\..+\.example$")

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          violations = []
          for path in tracked:
              if ALLOW.search(path):
                  continue
              for pattern, label in FORBIDDEN:
                  if pattern.search(path):
                      violations.append(f"{path}: {label}")
                      break

          if violations:
              print("Tracked secret-like files must not be committed:")
              print("\n".join(violations))
              sys.exit(1)
          print("secret-like file guard passed")
          PY

      - name: Run Drake CI preflight
        run: bash scripts/ci_preflight.sh
